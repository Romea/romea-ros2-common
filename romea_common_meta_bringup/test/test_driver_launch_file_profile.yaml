driver1:
  package: pk1
  executable: executable1
  plugin: none
  parameters:
    p1: 1
    p2:
      source:
        from: driver_configuration
        parameter: driver1.parameters.p2
    p3:
      source:
        from: device_configuration
        parameter: foo
    p4:
      source:
        from: device_configuration
        parameter: bar
      format: "2*{bar}"
driver2:
  package: pk2
  executable: executable2
  plugin: component2
  parameters:
    p5: 5
    p6:
      source:
        from: driver_configuration
        parameter: driver2.parameters.p6
      choices: [6, 10]
    p7:
      source:
        from: driver_configuration
        parameter: driver.parameters.p7
      default: 7
